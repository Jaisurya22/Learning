<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevCollab Dashboard</title>

  <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body>

  <div class="dashboard">

    <aside class="sidebar">
      <h2>DevCollab</h2>

      <nav>
        <ul>
          <li class="dashboard-link">📊Dashboard</li>
          <li class="projects-link">📁Projects</li>
          <li class="tasks-link">✅Tasks</li>
          <li class="team-link">👥Team</li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">

      <header class="header">
        <h1>Dashboard</h1>
      </header>

      <section class="stats">

        <div class="card">
          <h3>Total Projects</h3>
          <p>12</p>
        </div>

        <div class="card">
          <h3>Total Tasks</h3>
          <p>48</p>
        </div>

        <div class="card">
          <h3>Completed</h3>
          <p>30</p>
        </div>

        <div class="card">
          <h3>Statistics</h3>
          <p>18</p>
        </div>

      </section>

      <section class="tasks">

        <h2>Recent Tasks</h2>

        <ul>
          <li>Create Login Page</li>
          <li>Build Dashboard Layout</li>
          <li>Connect Backend API</li>
        </ul>

      </section>

    </main>

  </div>

</body>
</html>

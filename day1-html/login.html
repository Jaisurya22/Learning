<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCollab Login</title>
</head>
<body>

    <main>

        <section>

            <h1>DevCollab</h1>

            <h2>Login</h2>

            <form>

                <div>
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                    >
                </div>

                <div>
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="Enter password"
                    >
                </div>

                <button type="submit">
                    Login
                </button>

            </form>

        </section>

    </main>

</body>
</html>
